<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>{% block title %}Lokal Booking Drammen{% endblock %}</title>
	<style>
		body { font-family: Segoe UI, sans-serif; margin: 0; background: #f4f6fb; color: #1f2937; }
		header { background: #1e3a8a; color: #fff; padding: 1rem; }
		nav a { color: #fff; margin-right: 1rem; text-decoration: none; }
		main { max-width: 1000px; margin: 2rem auto; padding: 0 1rem; }
		.card { background: #fff; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,.06); }
		.table { width: 100%; border-collapse: collapse; }
		.table th, .table td { border-bottom: 1px solid #e5e7eb; padding: .5rem; text-align: left; }
		.msg-success { color: #065f46; }
		.msg-error { color: #991b1b; }
		button, .btn { background: #1e40af; color: #fff; border: none; padding: .5rem .8rem; border-radius: 6px; text-decoration: none; cursor: pointer; }
		.btn-secondary { background: #475569; }
		input, select, textarea { width: 100%; padding: .5rem; margin-bottom: .75rem; }
		.inline-form { display: inline-block; margin: 0; }
	</style>
</head>
<body>
	<header>
		<nav>
			<a href="{% url 'home' %}">Home</a>
			{% if request.user.is_authenticated %}
				<a href="{% url 'bookings:index' %}">My bookings</a>
				<a href="{% url 'bookings:create' %}">Create booking</a>
				{% if request.user.is_staff %}
					<a href="{% url 'dashboard:index' %}">Dashboard</a>
				{% endif %}
				<form class="inline-form" action="{% url 'logout' %}" method="post">
					{% csrf_token %}
					<button class="btn-secondary" type="submit">Log out</button>
				</form>
			{% else %}
				<a href="{% url 'login' %}">Log in</a>
			{% endif %}
		</nav>
	</header>
	<main>
		{% if messages %}
			<div class="card">
				{% for message in messages %}
					<p class="msg-{{ message.tags }}">{{ message }}</p>
				{% endfor %}
			</div>
		{% endif %}
		{% block content %}{% endblock %}
	</main>
</body>
</html>
